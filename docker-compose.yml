services:
  mcp-weather:
    build: .
    image: mcp-weather:latest
    container_name: mcp-weather
    env_file:
      - .env
    ports:
      - "3015:3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - mcp-network

networks:
  mcp-network:
    external: true
